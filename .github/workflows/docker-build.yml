name: Build and Push Docker Image to Aliyun ACR

on:
  release:
    types: [published]

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  IMAGE_NAME: mindvault

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate build metadata
        id: meta
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "Using release tag: $TAG"

          BUILD_TIME=$(date "+%Y-%m-%dT%H:%M:%S%z")
          GIT_COMMIT=${{ github.sha }}
          BUILD_BY="${{ github.actor }}"

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "git_commit=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "build_by=$BUILD_BY" >> $GITHUB_OUTPUT

      - name: Login to Aliyun ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          no-cache: true
          provenance: false

      - name: Image digest
        run: |
          echo "Image pushed successfully!"
          echo "Tag: ${{ steps.meta.outputs.tag }}"
          echo "Build time: ${{ steps.meta.outputs.build_time }}"
          echo "Git commit: ${{ steps.meta.outputs.git_commit }}"
          echo "Built by: ${{ steps.meta.outputs.build_by }}"
          echo "Registry: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}"
